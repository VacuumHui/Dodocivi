name: Build Android APK

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ==========================================================
      # 1. Репозиторий
      # ==========================================================

      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================================
      # 2. Java
      # ==========================================================

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ==========================================================
      # 3. Android SDK
      # ==========================================================

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          set -euxo pipefail

          command -v sdkmanager
          sdkmanager --version

          yes | sdkmanager --licenses >/dev/null || true

          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      # ==========================================================
      # 4. Flutter
      # ==========================================================

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show versions
        shell: bash
        run: |
          set -euxo pipefail

          flutter --version
          dart --version
          java -version
          sdkmanager --version

      # ==========================================================
      # 5. Проверка исходников
      # ==========================================================

      - name: Validate project
        shell: bash
        run: |
          set -euxo pipefail

          if [[ ! -f pubspec.yaml ]]; then
            echo "ERROR: pubspec.yaml not found"
            exit 1
          fi

          if [[ ! -f lib/main.dart ]]; then
            echo "ERROR: lib/main.dart not found"
            exit 1
          fi

          echo "Flutter project files found."

      # ==========================================================
      # 6. Создание Android-проекта
      #
      # Если android отсутствует в репозитории, Flutter создаст его.
      # Существующие lib и pubspec.yaml не удаляются.
      # ==========================================================

      - name: Create Android project when missing
        shell: bash
        run: |
          set -euxo pipefail

          if [[ ! -d android ]]; then
            flutter create \
              --platforms=android \
              --org=com.vacuumhui \
              --project-name=sdxl_collector \
              --no-pub \
              .
          else
            echo "Android directory already exists."
          fi

      # ==========================================================
      # 7. Основной AndroidManifest.xml
      #
      # INTERNET обязателен для release APK.
      # ACCESS_NETWORK_STATE используется для проверки подключения.
      # ==========================================================

      - name: Configure Android manifest
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p android/app/src/main

          cat > android/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <application
                  android:name="${applicationName}"
                  android:label="SDXL Collector"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="false">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">

                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                  </activity>

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />

              </application>

              <queries>
                  <intent>
                      <action android:name="android.intent.action.PROCESS_TEXT" />
                      <data android:mimeType="text/plain" />
                  </intent>
              </queries>

          </manifest>
          EOF

          echo "===== AndroidManifest.xml ====="
          cat android/app/src/main/AndroidManifest.xml

          grep -q \
            'android.permission.INTERNET' \
            android/app/src/main/AndroidManifest.xml

      # ==========================================================
      # 8. Android SDK версии приложения
      # ==========================================================

      - name: Configure Android SDK versions
        shell: bash
        run: |
          set -euxo pipefail

          python3 <<'PY'
          import re
          from pathlib import Path

          candidates = [
              Path("android/app/build.gradle.kts"),
              Path("android/app/build.gradle"),
          ]

          gradle_file = next(
              (path for path in candidates if path.exists()),
              None,
          )

          if gradle_file is None:
              raise SystemExit(
                  "android/app/build.gradle or "
                  "android/app/build.gradle.kts not found"
              )

          text = gradle_file.read_text(encoding="utf-8")

          replacements = [
              (
                  r"compileSdk\s*=\s*flutter\.compileSdkVersion",
                  "compileSdk = 36",
              ),
              (
                  r"compileSdkVersion\s+flutter\.compileSdkVersion",
                  "compileSdkVersion 36",
              ),
              (
                  r"compileSdkVersion\s*=\s*flutter\.compileSdkVersion",
                  "compileSdkVersion = 36",
              ),
              (
                  r"compileSdk\s*=\s*\d+",
                  "compileSdk = 36",
              ),
              (
                  r"compileSdkVersion\s+\d+",
                  "compileSdkVersion 36",
              ),
              (
                  r"compileSdkVersion\s*=\s*\d+",
                  "compileSdkVersion = 36",
              ),
              (
                  r"targetSdk\s*=\s*flutter\.targetSdkVersion",
                  "targetSdk = 35",
              ),
              (
                  r"targetSdkVersion\s+flutter\.targetSdkVersion",
                  "targetSdkVersion 35",
              ),
              (
                  r"targetSdkVersion\s*=\s*flutter\.targetSdkVersion",
                  "targetSdkVersion = 35",
              ),
              (
                  r"minSdk\s*=\s*flutter\.minSdkVersion",
                  "minSdk = 24",
              ),
              (
                  r"minSdkVersion\s+flutter\.minSdkVersion",
                  "minSdkVersion 24",
              ),
              (
                  r"minSdkVersion\s*=\s*flutter\.minSdkVersion",
                  "minSdkVersion = 24",
              ),
          ]

          for pattern, replacement in replacements:
              text = re.sub(pattern, replacement, text)

          gradle_file.write_text(text, encoding="utf-8")

          print(f"Configured: {gradle_file}")
          print(text)
          PY

      # ==========================================================
      # 9. Flutter-зависимости
      # ==========================================================

      - name: Install Flutter dependencies
        shell: bash
        run: |
          set -euxo pipefail

          flutter clean
          flutter pub get

      # ==========================================================
      # 10. compileSdk Android-плагинов
      # ==========================================================

      - name: Configure plugin compileSdk
        shell: bash
        run: |
          set -euxo pipefail

          python3 <<'PY'
          import json
          import re
          from pathlib import Path
          from urllib.parse import unquote, urlparse

          config_path = Path(".dart_tool/package_config.json")

          if not config_path.exists():
              raise SystemExit(
                  ".dart_tool/package_config.json not found"
              )

          config = json.loads(
              config_path.read_text(encoding="utf-8")
          )

          patched = 0

          for package in config.get("packages", []):
              root_uri = package.get("rootUri")

              if not root_uri:
                  continue

              parsed = urlparse(root_uri)

              if parsed.scheme == "file":
                  package_root = Path(unquote(parsed.path))
              else:
                  package_root = (
                      config_path.parent / unquote(root_uri)
                  ).resolve()

              android_dir = package_root / "android"

              if not android_dir.exists():
                  continue

              for filename in (
                  "build.gradle.kts",
                  "build.gradle",
              ):
                  gradle_file = android_dir / filename

                  if not gradle_file.exists():
                      continue

                  original = gradle_file.read_text(
                      encoding="utf-8"
                  )

                  updated = original

                  replacements = [
                      (
                          r"compileSdk\s*=\s*"
                          r"flutter\.compileSdkVersion",
                          "compileSdk = 36",
                      ),
                      (
                          r"compileSdkVersion\s+"
                          r"flutter\.compileSdkVersion",
                          "compileSdkVersion 36",
                      ),
                      (
                          r"compileSdkVersion\s*=\s*"
                          r"flutter\.compileSdkVersion",
                          "compileSdkVersion = 36",
                      ),
                      (
                          r"compileSdk\s*=\s*33",
                          "compileSdk = 36",
                      ),
                      (
                          r"compileSdkVersion\s+33",
                          "compileSdkVersion 36",
                      ),
                      (
                          r"compileSdkVersion\s*=\s*33",
                          "compileSdkVersion = 36",
                      ),
                  ]

                  for pattern, replacement in replacements:
                      updated = re.sub(
                          pattern,
                          replacement,
                          updated,
                      )

                  if updated != original:
                      gradle_file.write_text(
                          updated,
                          encoding="utf-8",
                      )

                      patched += 1

                      print(
                          f"Patched "
                          f"{package.get('name')}: "
                          f"{gradle_file}"
                      )

          print(f"Patched plugin Gradle files: {patched}")
          PY

      # ==========================================================
      # 11. Проверка INTERNET-разрешения
      # ==========================================================

      - name: Verify network permission
        shell: bash
        run: |
          set -euxo pipefail

          MANIFEST="android/app/src/main/AndroidManifest.xml"

          if ! grep -q \
            'android.permission.INTERNET' \
            "$MANIFEST"; then
            echo "ERROR: INTERNET permission is missing"
            exit 1
          fi

          if ! grep -q \
            'android.permission.ACCESS_NETWORK_STATE' \
            "$MANIFEST"; then
            echo "ERROR: ACCESS_NETWORK_STATE is missing"
            exit 1
          fi

          echo "Android network permissions are present."

      # ==========================================================
      # 12. Анализ
      # ==========================================================

      - name: Analyze Dart code
        continue-on-error: true
        run: flutter analyze

      # ==========================================================
      # 13. Тесты
      # ==========================================================

      - name: Run tests
        continue-on-error: true
        shell: bash
        run: |
          set -euxo pipefail

          if [[ -d test ]] && \
             find test -type f -name "*_test.dart" | grep -q .; then
            flutter test
          else
            echo "No Flutter tests found."
          fi

      # ==========================================================
      # 14. Release APK
      #
      # Номер GitHub Actions используется как Android build number.
      # ==========================================================

      - name: Build release APK
        shell: bash
        run: |
          set -euxo pipefail

          flutter build apk \
            --release \
            --build-number="${GITHUB_RUN_NUMBER}"

      # ==========================================================
      # 15. Подготовка результата
      # ==========================================================

      - name: Prepare APK artifact
        shell: bash
        run: |
          set -euxo pipefail

          APK_SOURCE="build/app/outputs/flutter-apk/app-release.apk"

          if [[ ! -f "$APK_SOURCE" ]]; then
            echo "ERROR: APK was not created"

            find build \
              -type f \
              \( -name "*.apk" -o -name "*.aab" \) \
              -print \
              || true

            exit 1
          fi

          mkdir -p dist

          cp \
            "$APK_SOURCE" \
            dist/Dodocivi-release.apk

          sha256sum \
            dist/Dodocivi-release.apk \
            > dist/Dodocivi-release.apk.sha256

          ls -lh dist
          cat dist/Dodocivi-release.apk.sha256

      # ==========================================================
      # 16. GitHub Artifact
      # ==========================================================

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dodocivi-APK-${{ github.run_number }}
          path: |
            dist/Dodocivi-release.apk
            dist/Dodocivi-release.apk.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 6

name: Build Android APK

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          set -euxo pipefail
          flutter --version
          java -version

      - name: Create Android project when missing
        shell: bash
        run: |
          set -euxo pipefail

          if [[ ! -d android ]]; then
            BACKUP_DIR="$(mktemp -d)"

            cp -a lib "$BACKUP_DIR/lib"
            cp pubspec.yaml "$BACKUP_DIR/pubspec.yaml"

            if [[ -d test ]]; then
              cp -a test "$BACKUP_DIR/test"
            fi

            if [[ -f analysis_options.yaml ]]; then
              cp analysis_options.yaml \
                "$BACKUP_DIR/analysis_options.yaml"
            fi

            flutter create \
              --platforms=android \
              --org=com.vacuumhui \
              --project-name=sdxl_collector \
              --no-pub \
              .

            rm -rf lib test

            cp -a "$BACKUP_DIR/lib" lib
            cp "$BACKUP_DIR/pubspec.yaml" pubspec.yaml

            if [[ -d "$BACKUP_DIR/test" ]]; then
              cp -a "$BACKUP_DIR/test" test
            fi

            if [[ -f "$BACKUP_DIR/analysis_options.yaml" ]]; then
              cp "$BACKUP_DIR/analysis_options.yaml" \
                analysis_options.yaml
            fi
          fi

      - name: Install Android SDK 35
        shell: bash
        run: |
          set -euxo pipefail

          SDKMANAGER="$(command -v sdkmanager)"

          yes | "$SDKMANAGER" --licenses >/dev/null || true

          "$SDKMANAGER" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Force Android compileSdk 35
        shell: bash
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          import json
          import re
          from pathlib import Path
          from urllib.parse import unquote, urlparse

          root = Path.cwd()

          compile_sdk = 35
          target_sdk = 35
          min_sdk = 24


          def patch_gradle(path: Path, *, app: bool) -> None:
              original = path.read_text(encoding="utf-8")
              updated = original

              compile_replacements = (
                  (
                      r"compileSdk\s*=\s*flutter\.compileSdkVersion",
                      f"compileSdk = {compile_sdk}",
                  ),
                  (
                      r"compileSdkVersion\s*=\s*flutter\.compileSdkVersion",
                      f"compileSdkVersion = {compile_sdk}",
                  ),
                  (
                      r"compileSdkVersion\s+flutter\.compileSdkVersion",
                      f"compileSdkVersion {compile_sdk}",
                  ),
                  (
                      r"compileSdk\s*=\s*\d+",
                      f"compileSdk = {compile_sdk}",
                  ),
                  (
                      r"compileSdkVersion\s*=\s*\d+",
                      f"compileSdkVersion = {compile_sdk}",
                  ),
                  (
                      r"compileSdkVersion\s+\d+",
                      f"compileSdkVersion {compile_sdk}",
                  ),
              )

              for pattern, replacement in compile_replacements:
                  updated = re.sub(
                      pattern,
                      replacement,
                      updated,
                  )

              if app:
                  app_replacements = (
                      (
                          r"targetSdk\s*=\s*flutter\.targetSdkVersion",
                          f"targetSdk = {target_sdk}",
                      ),
                      (
                          r"targetSdkVersion\s*=\s*flutter\.targetSdkVersion",
                          f"targetSdkVersion = {target_sdk}",
                      ),
                      (
                          r"targetSdkVersion\s+flutter\.targetSdkVersion",
                          f"targetSdkVersion {target_sdk}",
                      ),
                      (
                          r"minSdk\s*=\s*flutter\.minSdkVersion",
                          f"minSdk = {min_sdk}",
                      ),
                      (
                          r"minSdkVersion\s*=\s*flutter\.minSdkVersion",
                          f"minSdkVersion = {min_sdk}",
                      ),
                      (
                          r"minSdkVersion\s+flutter\.minSdkVersion",
                          f"minSdkVersion {min_sdk}",
                      ),
                  )

                  for pattern, replacement in app_replacements:
                      updated = re.sub(
                          pattern,
                          replacement,
                          updated,
                      )

              if updated != original:
                  path.write_text(updated, encoding="utf-8")
                  print(f"Patched: {path}")
              else:
                  print(f"No replacement required: {path}")


          app_gradle = next(
              (
                  path
                  for path in (
                      root / "android/app/build.gradle.kts",
                      root / "android/app/build.gradle",
                  )
                  if path.exists()
              ),
              None,
          )

          if app_gradle is None:
              raise SystemExit(
                  "android/app/build.gradle(.kts) was not found"
              )

          patch_gradle(app_gradle, app=True)


          package_config = (
              root / ".dart_tool/package_config.json"
          )

          config = json.loads(
              package_config.read_text(encoding="utf-8")
          )

          share_plus_gradle = None

          for package in config.get("packages", []):
              if package.get("name") != "share_plus":
                  continue

              root_uri = package["rootUri"]
              parsed = urlparse(root_uri)

              if parsed.scheme == "file":
                  package_root = Path(
                      unquote(parsed.path)
                  )
              else:
                  package_root = (
                      package_config.parent
                      / unquote(root_uri)
                  ).resolve()

              for filename in (
                  "build.gradle.kts",
                  "build.gradle",
              ):
                  candidate = (
                      package_root
                      / "android"
                      / filename
                  )

                  if candidate.exists():
                      share_plus_gradle = candidate
                      break

          if share_plus_gradle is None:
              raise SystemExit(
                  "share_plus Android Gradle file was not found"
              )

          patch_gradle(
              share_plus_gradle,
              app=False,
          )
          PY

          echo "----- Application SDK settings -----"

          grep -R \
            --line-number \
            -E "compileSdk|targetSdk|minSdk" \
            android/app/build.gradle* \
            || true

      - name: Analyze Dart code
        continue-on-error: true
        run: flutter analyze

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare APK artifact
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p dist

          cp \
            build/app/outputs/flutter-apk/app-release.apk \
            dist/Dodocivi-release.apk

          sha256sum \
            dist/Dodocivi-release.apk \
            | tee dist/Dodocivi-release.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dodocivi-APK-${{ github.run_number }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

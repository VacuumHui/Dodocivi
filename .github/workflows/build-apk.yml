name: Build Android APK

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ==========================================================
      # 1. Получение файлов репозитория
      # ==========================================================

      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================================
      # 2. Java 17
      #
      # ВАЖНО:
      # cache: gradle здесь отсутствует.
      #
      # Каталог android создаётся позже, поэтому в данный момент
      # ещё нет build.gradle и gradle-wrapper.properties.
      # ==========================================================

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ==========================================================
      # 3. Android SDK
      #
      # setup-android добавляет sdkmanager в PATH.
      # ==========================================================

      - name: Set up Android SDK tools
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platforms
        shell: bash
        run: |
          set -euxo pipefail

          echo "ANDROID_HOME=${ANDROID_HOME:-not-set}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-not-set}"

          command -v sdkmanager
          sdkmanager --version

          yes | sdkmanager --licenses >/dev/null || true

          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      # ==========================================================
      # 4. Flutter
      #
      # Используется текущий стабильный Flutter.
      # ==========================================================

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show installed versions
        shell: bash
        run: |
          set -euxo pipefail

          flutter --version
          dart --version
          java -version
          sdkmanager --version

          flutter doctor -v || true

      # ==========================================================
      # 5. Проверка исходников
      # ==========================================================

      - name: Validate Flutter sources
        shell: bash
        run: |
          set -euxo pipefail

          if [[ ! -f pubspec.yaml ]]; then
            echo "ERROR: pubspec.yaml was not found"
            exit 1
          fi

          if [[ ! -d lib ]]; then
            echo "ERROR: lib directory was not found"
            exit 1
          fi

          if [[ ! -f lib/main.dart ]]; then
            echo "ERROR: lib/main.dart was not found"
            exit 1
          fi

          echo "Flutter source files found."

      # ==========================================================
      # 6. Пересоздание Android-проекта
      #
      # Сохраняются:
      # - lib
      # - test
      # - pubspec.yaml
      # - pubspec.lock
      # - analysis_options.yaml
      #
      # Затем Android-проект создаётся текущим Flutter.
      # ==========================================================

      - name: Recreate Android project
        shell: bash
        run: |
          set -euxo pipefail

          BACKUP_DIR="$(mktemp -d)"

          cp -a lib "$BACKUP_DIR/lib"
          cp pubspec.yaml "$BACKUP_DIR/pubspec.yaml"

          if [[ -f pubspec.lock ]]; then
            cp pubspec.lock "$BACKUP_DIR/pubspec.lock"
          fi

          if [[ -d test ]]; then
            cp -a test "$BACKUP_DIR/test"
          fi

          if [[ -f analysis_options.yaml ]]; then
            cp \
              analysis_options.yaml \
              "$BACKUP_DIR/analysis_options.yaml"
          fi

          rm -rf android

          flutter create \
            --platforms=android \
            --org=com.vacuumhui \
            --project-name=sdxl_collector \
            --no-pub \
            .

          rm -rf lib
          rm -rf test

          cp -a "$BACKUP_DIR/lib" ./lib
          cp "$BACKUP_DIR/pubspec.yaml" ./pubspec.yaml

          if [[ -f "$BACKUP_DIR/pubspec.lock" ]]; then
            cp \
              "$BACKUP_DIR/pubspec.lock" \
              ./pubspec.lock
          fi

          if [[ -d "$BACKUP_DIR/test" ]]; then
            cp -a "$BACKUP_DIR/test" ./test
          fi

          if [[ -f "$BACKUP_DIR/analysis_options.yaml" ]]; then
            cp \
              "$BACKUP_DIR/analysis_options.yaml" \
              ./analysis_options.yaml
          fi

          echo "Android project recreated."

          find android \
            -maxdepth 3 \
            -type f \
            | sort \
            | head -100

      # ==========================================================
      # 7. Установка зависимостей
      # ==========================================================

      - name: Install Flutter dependencies
        shell: bash
        run: |
          set -euxo pipefail

          flutter clean
          flutter pub get

      - name: Show dependency versions
        shell: bash
        run: |
          set -euxo pipefail

          flutter pub deps --style=compact

      # ==========================================================
      # 8. Явная установка compileSdk и targetSdk
      #
      # Применяется к build.gradle.kts или build.gradle.
      # ==========================================================

      - name: Configure Android SDK versions
        shell: bash
        run: |
          set -euxo pipefail

          python3 <<'PY'
          import re
          from pathlib import Path

          candidates = [
              Path("android/app/build.gradle.kts"),
              Path("android/app/build.gradle"),
          ]

          gradle_file = next(
              (path for path in candidates if path.exists()),
              None,
          )

          if gradle_file is None:
              raise SystemExit(
                  "android/app/build.gradle(.kts) was not found"
              )

          text = gradle_file.read_text(encoding="utf-8")
          original = text

          replacements = [
              (
                  r"compileSdk\s*=\s*flutter\.compileSdkVersion",
                  "compileSdk = 36",
              ),
              (
                  r"compileSdkVersion\s+flutter\.compileSdkVersion",
                  "compileSdkVersion 36",
              ),
              (
                  r"compileSdkVersion\s*=\s*flutter\.compileSdkVersion",
                  "compileSdkVersion = 36",
              ),
              (
                  r"compileSdk\s*=\s*\d+",
                  "compileSdk = 36",
              ),
              (
                  r"compileSdkVersion\s+\d+",
                  "compileSdkVersion 36",
              ),
              (
                  r"compileSdkVersion\s*=\s*\d+",
                  "compileSdkVersion = 36",
              ),
              (
                  r"targetSdk\s*=\s*flutter\.targetSdkVersion",
                  "targetSdk = 35",
              ),
              (
                  r"targetSdkVersion\s+flutter\.targetSdkVersion",
                  "targetSdkVersion 35",
              ),
              (
                  r"targetSdkVersion\s*=\s*flutter\.targetSdkVersion",
                  "targetSdkVersion = 35",
              ),
              (
                  r"minSdk\s*=\s*flutter\.minSdkVersion",
                  "minSdk = 24",
              ),
              (
                  r"minSdkVersion\s+flutter\.minSdkVersion",
                  "minSdkVersion 24",
              ),
              (
                  r"minSdkVersion\s*=\s*flutter\.minSdkVersion",
                  "minSdkVersion = 24",
              ),
          ]

          for pattern, replacement in replacements:
              text = re.sub(pattern, replacement, text)

          gradle_file.write_text(text, encoding="utf-8")

          print(f"Configured: {gradle_file}")

          if text == original:
              print(
                  "No textual replacements were necessary. "
                  "The generated configuration may already be suitable."
              )
          PY

      # ==========================================================
      # 9. Исправление compileSdk Android-плагинов
      #
      # Необходимо на случай, если отдельный Flutter-плагин
      # использует старое значение flutter.compileSdkVersion.
      # ==========================================================

      - name: Configure plugin compileSdk
        shell: bash
        run: |
          set -euxo pipefail

          python3 <<'PY'
          import json
          import re
          from pathlib import Path
          from urllib.parse import unquote, urlparse

          config_path = Path(
              ".dart_tool/package_config.json"
          )

          if not config_path.exists():
              raise SystemExit(
                  ".dart_tool/package_config.json was not found"
              )

          config = json.loads(
              config_path.read_text(encoding="utf-8")
          )

          patched = 0

          for package in config.get("packages", []):
              root_uri = package.get("rootUri")

              if not root_uri:
                  continue

              parsed = urlparse(root_uri)

              if parsed.scheme == "file":
                  package_root = Path(
                      unquote(parsed.path)
                  )
              else:
                  package_root = (
                      config_path.parent
                      / unquote(root_uri)
                  ).resolve()

              android_dir = package_root / "android"

              if not android_dir.exists():
                  continue

              for filename in (
                  "build.gradle.kts",
                  "build.gradle",
              ):
                  gradle_file = android_dir / filename

                  if not gradle_file.exists():
                      continue

                  original = gradle_file.read_text(
                      encoding="utf-8"
                  )

                  updated = original

                  replacements = [
                      (
                          r"compileSdk\s*=\s*"
                          r"flutter\.compileSdkVersion",
                          "compileSdk = 36",
                      ),
                      (
                          r"compileSdkVersion\s+"
                          r"flutter\.compileSdkVersion",
                          "compileSdkVersion 36",
                      ),
                      (
                          r"compileSdkVersion\s*=\s*"
                          r"flutter\.compileSdkVersion",
                          "compileSdkVersion = 36",
                      ),
                      (
                          r"compileSdk\s*=\s*33",
                          "compileSdk = 36",
                      ),
                      (
                          r"compileSdkVersion\s+33",
                          "compileSdkVersion 36",
                      ),
                      (
                          r"compileSdkVersion\s*=\s*33",
                          "compileSdkVersion = 36",
                      ),
                  ]

                  for pattern, replacement in replacements:
                      updated = re.sub(
                          pattern,
                          replacement,
                          updated,
                      )

                  if updated != original:
                      gradle_file.write_text(
                          updated,
                          encoding="utf-8",
                      )

                      patched += 1

                      print(
                          f"Patched plugin "
                          f"{package.get('name')}: "
                          f"{gradle_file}"
                      )

          print(f"Patched plugin files: {patched}")
          PY

      # ==========================================================
      # 10. Диагностика Android
      # ==========================================================

      - name: Show Android configuration
        shell: bash
        run: |
          set -euxo pipefail

          echo "===== Application Gradle file ====="

          if [[ -f android/app/build.gradle.kts ]]; then
            cat android/app/build.gradle.kts
          elif [[ -f android/app/build.gradle ]]; then
            cat android/app/build.gradle
          fi

          echo "===== Effective SDK lines ====="

          grep -R \
            --line-number \
            -E "compileSdk|targetSdk|minSdk|ndkVersion" \
            android/app/build.gradle* \
            || true

          echo "===== Gradle wrapper ====="

          cat \
            android/gradle/wrapper/gradle-wrapper.properties

          echo "===== Android settings ====="

          if [[ -f android/settings.gradle.kts ]]; then
            cat android/settings.gradle.kts
          elif [[ -f android/settings.gradle ]]; then
            cat android/settings.gradle
          fi

      # ==========================================================
      # 11. Анализ
      #
      # Пока не блокирует APK-сборку.
      # ==========================================================

      - name: Analyze Dart code
        continue-on-error: true
        run: flutter analyze

      # ==========================================================
      # 12. Тесты
      # ==========================================================

      - name: Run tests
        continue-on-error: true
        shell: bash
        run: |
          set -euxo pipefail

          if [[ -d test ]] && \
             find test -type f -name "*_test.dart" | grep -q .; then
            flutter test
          else
            echo "No Flutter tests found."
          fi

      # ==========================================================
      # 13. Сборка APK
      # ==========================================================

      - name: Build release APK
        shell: bash
        run: |
          set -euxo pipefail

          flutter build apk \
            --release

      # ==========================================================
      # 14. Подготовка результата
      # ==========================================================

      - name: Prepare APK artifact
        shell: bash
        run: |
          set -euxo pipefail

          APK_SOURCE="build/app/outputs/flutter-apk/app-release.apk"

          if [[ ! -f "$APK_SOURCE" ]]; then
            echo "ERROR: APK was not created."

            find build \
              -type f \
              \( -name "*.apk" -o -name "*.aab" \) \
              -print \
              || true

            exit 1
          fi

          mkdir -p dist

          cp \
            "$APK_SOURCE" \
            dist/Dodocivi-release.apk

          sha256sum \
            dist/Dodocivi-release.apk \
            > dist/Dodocivi-release.apk.sha256

          ls -lh dist

          cat dist/Dodocivi-release.apk.sha256

      # ==========================================================
      # 15. Загрузка APK в GitHub Artifacts
      # ==========================================================

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dodocivi-APK-${{ github.run_number }}
          path: |
            dist/Dodocivi-release.apk
            dist/Dodocivi-release.apk.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
